name: Log Processing Engine CI

on:
  push:
    branches:
      - master

  pull_request:
    branches: ["master"]
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read

jobs:

  # ==========================================================
  # BUILD
  # ==========================================================

  check-changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        id: filter
        with:
          filters: |
            relevant:
              - "src/skillcorner/**"
              - ".github/workflows/ci.yml"

  build-skillcorner:
    needs: check-changes
    if: github.event_name == 'push' || needs.check-changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
          cache: pip

      - name: Install build dependencies
        run: |
          pip install build

      - name: Build package
        run: |
          python -m build

  # ==========================================================
  # LINT
  # ==========================================================

  lint:
    needs: [check-changes, build-skillcorner]
    if: github.event_name == 'push' || needs.check-changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Ruff lint
        run: |
          ruff check .

      - name: Ruff format check
        run: |
          ruff format --check .

      - name: MyPy type check
        run: |
          mypy .

  # ==========================================================
  # TEST
  # ==========================================================

  test:
    needs: [check-changes, build-skillcorner]
    if: github.event_name == 'push' || needs.check-changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest -q

  # ==========================================================
  # Deploy
  # ==========================================================

  deploy-skillcorner:
    needs: [check-changes, lint, test]
    #if: github.event_name == 'push' && github.ref == 'refs/heads/master' && needs.check-changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/scalingo-deploy
        with:
          branch: master